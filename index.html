// ── REAL GitHub fetcher ──────────────────────────────
async function fetchRepoFiles(owner, repo) {
  const CODE_EXT=[".py",".js",".ts",".jsx",".tsx",".go",".java",".rb",".php",".rs",".cpp",".c",".cs"];
  const PRIORITY=["auth","api","route","model","controller","service","util","middleware","security","config"];

  const headers=GH_TOKEN?{Authorization:"token "+GH_TOKEN}:{};
  const repoRes = await fetch("https://api.github.com/repos/"+owner+"/"+repo,{headers:headers});
  if(repoRes.status===403||repoRes.status===429) throw new Error("GitHub rate limit hit. Please add a GitHub token in the field above to continue.");
  if(repoRes.status===404) throw new Error("Repository '"+owner+"/"+repo+"' not found or is private. Check the name.");
  if(!repoRes.ok) throw new Error("GitHub error "+repoRes.status+". Try adding a GitHub token.");
  const repoData = await repoRes.json();
  const branch = repoData.default_branch || "main";

  const treeRes = await fetch("https://api.github.com/repos/"+owner+"/"+repo+"/git/trees/"+branch+"?recursive=1",{headers:headers});
  if(!treeRes.ok) throw new Error("Could not read repository file tree.");
  const tree = await treeRes.json();

  if(!tree.tree) throw new Error("Repository appears to be empty.");

  let files = tree.tree.filter(function(f){
    return f.type==="blob" &&
      CODE_EXT.some(function(e){return f.path.endsWith(e);}) &&
      f.size > 100 && f.size < 40000 &&
      !f.path.includes("node_modules") &&
      !f.path.includes("vendor/") &&
      !f.path.includes(".min.") &&
      !f.path.includes("dist/") &&
      !f.path.includes("build/") &&
      !f.path.includes("__pycache__") &&
      !f.path.includes(".test.") &&
      !f.path.includes(".spec.");
  });

  const priority = files.filter(function(f){return PRIORITY.some(function(p){return f.path.toLowerCase().includes(p);});});
  const rest = files.filter(function(f){return !PRIORITY.some(function(p){return f.path.toLowerCase().includes(p);});});
  files = priority.concat(rest).slice(0,8);

  if(files.length===0) throw new Error("No analyzable source files found. This repo may use an unsupported language.");

  const contents = await Promise.all(files.map(async function(f){
    try{
      const res = await fetch("https://api.github.com/repos/"+owner+"/"+repo+"/contents/"+f.path,{headers:headers});
      if(!res.ok) return null;
      const data = await res.json();
      if(!data.content) return null;
      const decoded = atob(data.content.replace(/\n/g,""));
      return {path:f.path, content:decoded.slice(0,2500)};
    }catch(e){return null;}
  }));

  return contents.filter(Boolean);
}

// ── Gemini AI ────────────────────────────────────────
async function gemini(prompt) {
  const r = await fetch(GEMINI_URL,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{role:"user",parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1500,temperature:0.3}})
  });
  const d = await r.json();
  const t = d&&d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts&&d.candidates[0].content.parts[0]&&d.candidates[0].content.parts[0].text;
  if(!t) throw new Error("No response from Gemini");
  return t;
}

async function analyzeCode(files, repoName) {
  const fileSnippets = files.map(function(f){
    return "=== FILE: "+f.path+" ===\n"+f.content;
  }).join("\n\n");

  const prompt = "You are CodeProbe AI, an elite security engineer. Analyze these real source files from the GitHub repository '"+repoName+"' and find actual security vulnerabilities and performance issues.\n\nFILES:\n"+fileSnippets+"\n\nRespond with EXACTLY this format for each issue found (find 4-8 real issues):\n\nISSUE\nTitle: [specific issue title]\nSeverity: [critical|warning|info]\nCategory: [Security|Performance|Quality|Observability]\nFile: [exact filename from above]\nLine: [approximate line number]\nDescription: [2 sentences explaining the real problem found in this code]\nVulnerable:\n[the actual vulnerable code snippet, max 5 lines]\nFix:\n[the corrected code, max 5 lines]\nEND\n\nOnly report issues actually present in the code above. Be specific and accurate.";

  return await gemini(prompt);
}

function parseIssues(text, files) {
  const issues = [];
  const blocks = text.split(/\nISSUE\n|\nISSUE:/i).filter(function(b){return b.trim().length>20;});

  blocks.forEach(function(block, idx){
    const get = function(key){
      const m = block.match(new RegExp(key+":\\s*([^\\n]+)","i"));
      return m ? m[1].trim() : "";
    };

    const title = get("Title");
    if(!title) return;

    const sevRaw = get("Severity").toLowerCase();
    const sev = sevRaw.includes("crit")||sevRaw.includes("high") ? "critical"
               : sevRaw.includes("warn")||sevRaw.includes("med") ? "warning" : "info";

    const vulnMatch = block.match(/Vulnerable:\s*\n([\s\S]*?)(?:\nFix:|\nEND)/i);
    const fixMatch  = block.match(/Fix:\s*\n([\s\S]*?)(?:\nEND|\nISSUE|$)/i);

    issues.push({
      id: idx+1,
      sev: sev,
      file: get("File") || (files[0] ? files[0].path : "unknown"),
      line: parseInt(get("Line"))||1,
      title: title.slice(0,80),
      cat: get("Category")||"Security",
      desc: get("Description")||"See analysis below.",
      bad: vulnMatch ? vulnMatch[1].trim().slice(0,300) : "See file for details",
      good: fixMatch  ? fixMatch[1].trim().slice(0,300)  : "Apply recommended fix",
    });
  });

  return issues.slice(0,10);
}

function Analyzer(){
  const[repo,setRepo]=useState("");
  const[ghToken,setGhToken]=useState("");
  const[showToken,setShowToken]=useState(false);
  const[phase,setPhase]=useState("idle"); // idle|fetching|analyzing|done|error
  const[status,setStatus]=useState("");
  const[issues,setIssues]=useState([]);
  const[sel,setSel]=useState(null);
  const[aiCache,setAiCache]=useState({});
  const[aiLoad,setAiLoad]=useState(false);
  const[aiText,setAiText]=useState("");
  const[tab,setTab]=useState("detail");
  const[errMsg,setErrMsg]=useState("");
  const[repoFiles,setRepoFiles]=useState([]);

  const SEV={critical:{c:T.rd,bg:"rgba(255,64,96,.1)",l:"CRITICAL"},warning:{c:T.am,bg:"rgba(255,176,32,.1)",l:"WARNING"},info:{c:T.bl,bg:"rgba(77,159,255,.1)",l:"INFO"}};

  async function runScan(){
    const parts=repo.trim().replace("https://github.com/","").split("/");
    if(parts.length<2||!parts[0]||!parts[1]){setErrMsg("Enter a valid repo like: facebook/react");return;}
    const owner=parts[0], name=parts[1];
    GH_TOKEN=ghToken.trim();
    setPhase("fetching");setErrMsg("");setIssues([]);setSel(null);setAiText("");setRepoFiles([]);

    try{
      setStatus("Fetching files from "+owner+"/"+name+"…");
      const files = await fetchRepoFiles(owner, name);
      setRepoFiles(files);
      setStatus("Analyzing "+files.length+" files with Gemini AI…");
      setPhase("analyzing");

      const raw = await analyzeCode(files, owner+"/"+name);
      const parsed = parseIssues(raw, files);

      if(parsed.length===0){
        setErrMsg("Gemini found no significant issues in this repository, or could not parse the response. Try another repo.");
        setPhase("idle");
        return;
      }

      setIssues(parsed);
      setPhase("done");
    }catch(e){
      setErrMsg(e.message||"Something went wrong. Check your internet connection.");
      setPhase("idle");
    }
  }

  async function pickIssue(issue){
    setSel(issue);setTab("detail");
    if(aiCache[issue.id]){setAiText(aiCache[issue.id]);return;}
    setAiLoad(true);setAiText("");
    try{
      const t = await gemini("Analyze this real code issue from a GitHub repo.\nTitle: "+issue.title+"\nFile: "+issue.file+"\nProblem: "+issue.desc+"\nVulnerable code:\n"+issue.bad+"\n\nIn 3 sentences: (1) exact attack/impact, (2) why the fix works, (3) one extra hardening step.");
      setAiCache(function(c){const n={...c};n[issue.id]=t;return n;});
      setAiText(t);
    }catch(e){setAiText("AI analysis failed: "+e.message);}
    setAiLoad(false);
  }

  const critCount=issues.filter(function(i){return i.sev==="critical";}).length;
  const warnCount=issues.filter(function(i){return i.sev==="warning";}).length;

          </div>
        </div>
      )}
    </div>
  );
}

// AI ASSISTANT

function AIAssistant(){
  const[msgs,setMsgs]=useState([{r:"ai",t:"Hi! I'm CodeProbe AI by Daniel Mose.\n\nPaste any code for expert security and quality review. I'll find real vulnerabilities, explain the impact, and give you working fixes.\n\nWhat would you like analyzed?"}]);
  const[inp,setInp]=useState("");
  const[loading,setLoading]=useState(false);
  const[hist,setHist]=useState([]);
  const[starters,setStarters]=useState(true);
  const bottom=useRef();const ta=useRef();
  useEffect(function(){if(bottom.current)bottom.current.scrollIntoView({behavior:"smooth"});},[msgs]);

  async function send(){
    const q=inp.trim();if(!q||loading)return;
    setInp("");if(ta.current)ta.current.style.height="auto";
    setStarters(false);setMsgs(function(m){return [...m,{r:"user",t:q}];});setLoading(true);
    const h=[...hist,{role:"user",parts:[{text:q}]}];
    try{
      const sys="You are CodeProbe AI by Daniel Mose. Review code for: security vulnerabilities (OWASP Top 10), performance issues, bugs, bad practices. Structure: (1) Issues found, (2) Why each matters, (3) Fixed code. Be specific and technical.";
      const body={contents:[{role:"user",parts:[{text:"System: "+sys+"\nReady?"}]},{role:"model",parts:[{text:"Ready. Paste your code."}]},...h],generationConfig:{maxOutputTokens:600,temperature:0.3}};
      const r=await fetch(GEMINI_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      const d=await r.json();
      const ans=d&&d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts&&d.candidates[0].content.parts[0]&&d.candidates[0].content.parts[0].text||"Analysis unavailable.";
      setHist([...h,{role:"model",parts:[{text:ans}]}]);
      setMsgs(function(m){return [...m,{r:"ai",t:ans}];});
    }catch(e){setMsgs(function(m){return [...m,{r:"ai",t:"Connection error: "+e.message}];});}
    setLoading(false);
  }

  const STARTS=["Review this Python function for SQL injection","Is this JWT auth implementation secure?","Find performance issues in this database query","What security issues does this API endpoint have?"];
  return(
    <div style={{paddingTop:64,minHeight:"100vh"}}>
      <div style={{maxWidth:820,margin:"0 auto",padding:"44px 36px 80px"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(0,212,255,.07)",border:"1px solid rgba(0,212,255,.25)",padding:"5px 14px",borderRadius:4,marginBottom:18}}>
            <Dot size={6}/><span style={{fontSize:10,fontFamily:T.mono,color:T.ac,letterSpacing:".12em"}}>GEMINI‑POWERED · REAL CODE REVIEW</span>
          </div>
          <h1 style={{fontFamily:T.disp,fontSize:"clamp(1.9rem,4vw,2.8rem)",fontWeight:900,letterSpacing:"-.03em",color:T.t0,marginBottom:10}}>AI Code Assistant</h1>
          <p style={{color:T.t1,fontSize:14,lineHeight:1.8,maxWidth:420,margin:"0 auto"}}>Paste any code snippet and get real security, performance, and quality analysis from Gemini AI.</p>
        </div>
        {starters&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:18}}>
            {STARTS.map(function(s){return(
              <button key={s} onClick={function(){setInp(s);setStarters(false);if(ta.current)ta.current.focus();}} style={{padding:"11px 14px",textAlign:"left",borderRadius:7,border:"1px solid rgba(255,255,255,.08)",background:T.s1,color:T.t1,fontSize:12,fontFamily:T.sans,cursor:"pointer",lineHeight:1.5,transition:"all .2s"}}
                onMouseEnter={function(e){e.currentTarget.style.borderColor="rgba(0,212,255,.3)";e.currentTarget.style.color=T.t0;}} onMouseLeave={function(e){e.currentTarget.style.borderColor="rgba(255,255,255,.08)";e.currentTarget.style.color=T.t1;}}>{s} →</button>
            );})}
          </div>
        )}
        <div style={{background:T.s1,border:"1px solid rgba(255,255,255,.08)",borderRadius:11,overflow:"hidden",marginBottom:8}}>
          <div style={{overflowY:"auto",padding:"20px 22px",display:"flex",flexDirection:"column",gap:13,maxHeight:400}}>
            {msgs.map(function(m,i){return(
              <div key={i} style={{display:"flex",justifyContent:m.r==="user"?"flex-end":"flex-start",gap:9}}>
                {m.r==="ai"&&<div style={{width:30,height:30,borderRadius:"50%",flexShrink:0,marginTop:2,background:"linear-gradient(135deg,"+T.ac+","+T.bl+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:"#000",fontFamily:T.disp}}>⌖</div>}
                <div style={{maxWidth:"78%",padding:"11px 15px",fontSize:13,lineHeight:1.8,whiteSpace:"pre-wrap",wordBreak:"break-word",fontFamily:T.sans,color:T.t0,borderRadius:m.r==="user"?"11px 11px 3px 11px":"3px 11px 11px 11px",background:m.r==="user"?"rgba(0,212,255,.1)":T.s2,border:"1px solid "+(m.r==="user"?"rgba(0,212,255,.2)":"rgba(255,255,255,.06)")}}>{m.t}</div>
              </div>
            );})}
            {loading&&<div style={{display:"flex",gap:9}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,"+T.ac+","+T.bl+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#000"}}>⌖</div>
              <div style={{padding:"11px 15px",background:T.s2,border:"1px solid rgba(255,255,255,.06)",borderRadius:"3px 11px 11px 11px",display:"flex",gap:5}}>
                {[0,1,2].map(function(i){return <div key={i} style={{width:6,height:6,borderRadius:"50%",background:T.ac,animation:"bounce 1s "+(i*.15)+"s infinite"}}/>;})}</div>
            </div>}
            <div ref={bottom}/>
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,.07)",padding:"13px 16px",background:"linear-gradient(0deg,"+T.bg+","+T.s1+")",display:"flex",gap:9,alignItems:"flex-end"}}>
            <textarea ref={ta} value={inp} rows={1}
              onChange={function(e){setInp(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,160)+"px";}}
              onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
              placeholder="Paste code or ask a security question… (Enter sends, Shift+Enter for newline)"
              style={{flex:1,padding:"10px 13px",background:T.bg,border:"1px solid rgba(255,255,255,.08)",borderRadius:7,color:T.t0,fontSize:12,fontFamily:T.mono,resize:"none",outline:"none",lineHeight:1.6,maxHeight:160}}
              onFocus={function(e){e.target.style.borderColor=T.ac;}} onBlur={function(e){e.target.style.borderColor="rgba(255,255,255,.08)";}}/>
            <button onClick={send} disabled={!inp.trim()||loading}
              style={{width:42,height:42,borderRadius:7,border:"none",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s",background:(inp.trim()&&!loading)?"linear-gradient(135deg,"+T.ac+","+T.bl+")":T.s2,color:(inp.trim()&&!loading)?"#000":T.t2,cursor:(inp.trim()&&!loading)?"pointer":"not-allowed"}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
            </button>
          </div>
        </div>
        <p style={{textAlign:"center",fontSize:10,fontFamily:T.mono,color:T.t2}}>🔒 Powered by Gemini AI · Built by <span style={{color:T.ac}}>Daniel Mose</span></p>
      </div>
    </div>
  );
}

// Restore any CF-obfuscated emails on page load
window.addEventListener('load', function(){
  document.querySelectorAll('.__cf_email__').forEach(function(el){
    var encoded = el.getAttribute('data-cfemail');
    if(encoded){
      var email = '', r = parseInt(encoded.substr(0,2),16);
      for(var n=2; n<encoded.length; n+=2){
        email += String.fromCharCode(parseInt(encoded.substr(n,2),16)^r);
      }
      el.textContent = email;
      el.removeAttribute('data-cfemail');
    }
  });
});
